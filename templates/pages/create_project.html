{% extends "base.html" %}
{% block content %}
<section class="content-card">
    <h2>Создание проекта</h2>
    <form method="post" action="{% url 'app:project_create' %}">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Название проекта</label>
                <input id="name" name="name" type="text" placeholder="Neo Staffing Platform" required>
            </div>
            <div class="form-group">
                <label for="manager_id">Менеджер</label>
                <select id="manager_id" name="manager_id" required>
                    <option value="">Не выбран</option>
                    {% for manager in managers %}
                        <option value="{{ manager.id }}">{{ manager.last_name }} {{ manager.first_name }} {{ manager.middle_name|default:'' }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="start_date">Дата начала</label>
                <input id="start_date" name="start_date" type="date" required>
            </div>
            <div class="form-group">
                <label for="end_date">Дата окончания</label>
                <input id="end_date" name="end_date" type="date">
            </div>
            <div class="form-group">
                <label for="budget">Бюджет</label>
                <input id="budget" name="budget" type="number" step="0.01" min="0" placeholder="4500000" required>
            </div>
            <div class="form-group">
                <label for="status">Статус</label>
                <select id="status" name="status">
                    {% for value, label in status_choices %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" rows="5" placeholder="Платформа для управления распределением специалистов по проектам." required></textarea>
        </div>
        <div class="form-group">
            <label for="expected_result">Ожидаемый результат</label>
            <textarea id="expected_result" name="expected_result" rows="4" placeholder="Рабочая система с модулем рекомендаций и аналитикой." required></textarea>
        </div>
        <div class="actions-row">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'app:projects_list' %}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</section>
{% endblock %}
