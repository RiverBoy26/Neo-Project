{% extends 'base.html' %}
{% block content %}
<section class="content-grid two-columns">
    <article class="card">
        <h2>{{ profile.name }}</h2>
        <p><strong>Роль:</strong> {{ profile.role }}</p>
        <p><strong>Email:</strong> {{ profile.email }}</p>
        <p><strong>Телефон:</strong> {{ profile.phone }}</p>
    </article>
    <article class="card form-card">
        <h2>Редактирование профиля</h2>
        <form class="form-grid">
            <label><span>Имя</span><input type="text" value="{{ profile.name }}"></label>
            <label><span>Email</span><input type="email" value="{{ profile.email }}"></label>
            <label><span>Телефон</span><input type="text" value="{{ profile.phone }}"></label>
            <button type="button" class="btn-primary">Сохранить</button>
        </form>
    </article>
</section>
{% endblock %}
