{% extends 'base.html' %}
{% block content %}
<section class="content-grid two-columns compact-gap">
    {% for item in feedback_items %}
    <article class="card">
        <span class="status-badge">{{ item.rating }}</span>
        <h2>{{ item.target }}</h2>
        <p><strong>Автор:</strong> {{ item.author }}</p>
        <p>{{ item.comment }}</p>
    </article>
    {% empty %}
    <article class="card"><p>Отзывов пока нет.</p></article>
    {% endfor %}
</section>
<section class="card form-card">
    <h2>Добавить отзыв</h2>
    <form class="form-grid two-col-form" method="post" action="{% url 'app:feedback' %}">
        {% csrf_token %}
        <label><span>Проект</span>
            <select name="project_id">
                {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="full-width"><span>Комментарий</span><textarea name="text" rows="4"></textarea></label>
        <div class="full-width"><button type="submit" class="btn-primary">Сохранить отзыв</button></div>
    </form>
</section>
{% endblock %}
